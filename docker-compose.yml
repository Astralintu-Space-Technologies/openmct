services:
  openmct-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmct-groundstation:local
    container_name: openmct-dashboard
    ports:
      - "8080:80"
    restart: unless-stopped

  zmq-ws-bridge:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    image: zmq-ws-bridge:local
    container_name: zmq-ws-bridge
    # host networking: needs to reach the SDR flowgraph's ZMQ PUB sink,
    # which is a process on another machine on the LAN, not a container.
    network_mode: host
    restart: unless-stopped

  camera-bridge:
    image: bluenviron/mediamtx:latest
    container_name: camera-bridge
    # mediamtx.yml is gitignored (real camera credentials) — copy it from
    # mediamtx.yml.example first if it doesn't exist yet on this host.
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554" # RTSP
      - "8888:8888" # HLS — this is what the Camera panel's streamUrl points at
    restart: unless-stopped

# No custom/external network here on purpose: none of these three services
# talk to each other or to antenna-controller's containers over docker
# networking — the browser reaches everything through host-published ports
# (8000 for antenna-controller, 8080/8554/8888 here), so container-level
# network topology doesn't matter. Each service gets compose's own default
# network, which is all it needs.
