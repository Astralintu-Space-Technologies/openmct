server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # OpenMCT uses hash-based routing (#/browse/...), so a plain static
    # server is enough — this try_files is just cheap insurance for any
    # direct sub-path request.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
